# Configuration de l'API Gateway
spring.application.name=api-gateway
server.port=8888

# Configuration Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Désactiver la découverte automatique des services (on utilise les routes manuelles)
spring.cloud.gateway.discovery.locator.enabled=false

# Désactiver le CORS par défaut de Gateway (géré par CorsConfig.java)
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=false

# Logging pour debug
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG

<div class="p-6">
  <!-- Back Link -->
  <div class="mb-6">
    <a routerLink="/reclamations" 
       class="text-[rgb(0,200,151)] hover:text-[rgb(0,180,135)] transition-colors flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Back to Reclamations
    </a>
  </div>

  <!-- Error Message -->
  @if (error) {
    <div class="mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg dark:bg-red-900 dark:border-red-800 dark:text-red-200">
      {{ error }}
    </div>
  }

  <!-- Loading State -->
  @if (loading) {
    <div class="flex items-center justify-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[rgb(0,200,151)]"></div>
    </div>
  }

  <!-- Reclamation Details -->
  @if (!loading && reclamation) {
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 border border-gray-200 dark:border-gray-700 mb-8">
      <h2 class="text-2xl font-bold mb-6">Reclamation #{{ reclamation.id }}</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- User ID -->
        <div>
          <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">User ID</label>
          <p class="text-gray-900 dark:text-white">{{ reclamation.userId }}</p>
        </div>

        <!-- Date -->
        <div>
          <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">Date</label>
          <p class="text-gray-900 dark:text-white">{{ reclamation.date | date:'medium' }}</p>
        </div>

        <!-- Subject -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">Subject</label>
          <p class="text-gray-900 dark:text-white font-medium">{{ reclamation.objet }}</p>
        </div>

        <!-- Description -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">Description</label>
          <p class="text-gray-900 dark:text-white whitespace-pre-wrap">{{ reclamation.description }}</p>
        </div>

        <!-- Status -->
        <div>
          <label class="block text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">Status</label>
          <span [class]="getStatusClass(reclamation.status) + ' px-3 py-1 rounded-full text-xs font-medium'">
            {{ reclamation.status }}
          </span>
        </div>
      </div>
    </div>

    <!-- Status Update Section -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 border border-gray-200 dark:border-gray-700">
      <h3 class="text-lg font-bold mb-4">Update Status</h3>
      <div class="flex gap-2">
        <button (click)="updateStatus('pending')" 
                [class]="reclamation.status === 'pending' ? 'bg-[rgb(0,200,151)] text-white' : 'bg-gray-200 dark:bg-gray-700'"
                class="px-4 py-2 rounded-lg transition-colors">
          Pending
        </button>
        <button (click)="updateStatus('in_progress')" 
                [class]="reclamation.status === 'in_progress' ? 'bg-[rgb(0,200,151)] text-white' : 'bg-gray-200 dark:bg-gray-700'"
                class="px-4 py-2 rounded-lg transition-colors">
          In Progress
        </button>
        <button (click)="updateStatus('resolved')" 
                [class]="reclamation.status === 'resolved' ? 'bg-[rgb(0,200,151)] text-white' : 'bg-gray-200 dark:bg-gray-700'"
                class="px-4 py-2 rounded-lg transition-colors">
          Resolved
        </button>
        <button (click)="updateStatus('rejected')" 
                [class]="reclamation.status === 'rejected' ? 'bg-[rgb(0,200,151)] text-white' : 'bg-gray-200 dark:bg-gray-700'"
                class="px-4 py-2 rounded-lg transition-colors">
          Rejected
        </button>
      </div>
    </div>
  }
</div>

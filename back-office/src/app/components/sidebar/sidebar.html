<aside class="fixed left-0 top-0 h-screen w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 transition-colors duration-300">
  <div class="flex flex-col h-full">
    <!-- Logo -->
    <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-200 dark:border-gray-700">
      <div class="relative w-10 h-10">
        <svg viewBox="0 0 100 100" class="w-full h-full">
          <!-- Gradient Circle Background -->
          <defs>
            <linearGradient id="sidebarLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:rgb(0,200,151);stop-opacity:1" />
              <stop offset="50%" style="stop-color:rgb(255,215,0);stop-opacity:1" />
              <stop offset="100%" style="stop-color:rgb(255,127,80);stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="45" fill="url(#sidebarLogoGradient)"/>
          <!-- W Letter -->
          <text x="50" y="48" font-family="Arial, sans-serif" font-size="45" font-weight="bold" fill="black" text-anchor="middle" dominant-baseline="middle">W</text>
          <!-- Open Book -->
          <path d="M 25 65 Q 50 55 75 65" stroke="black" stroke-width="4" fill="none"/>
          <path d="M 25 65 L 25 72 Q 50 62 75 72 L 75 65" fill="rgba(255,255,255,0.3)" stroke="black" stroke-width="2"/>
          <!-- Speech Bubble Tail -->
          <path d="M 20 75 L 15 85 L 28 78 Z" fill="url(#sidebarLogoGradient)"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold bg-gradient-to-r from-[rgb(0,200,151)] to-[rgb(255,127,80)] bg-clip-text text-transparent">
          jungle in english
        </h1>
        <p class="text-xs text-gray-500 dark:text-gray-400">Admin Panel</p>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto scrollbar-hide">
      @for (item of menuItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-gradient-to-r from-[rgb(0,200,151)] to-[rgb(255,127,80)] text-white"
          [routerLinkActiveOptions]="{exact: false}"
          class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all hover:bg-gray-100 dark:hover:bg-gray-700 group">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon"/>
          </svg>
          <span class="font-medium">{{ item.label }}</span>
        </a>
      }
      
      <!-- Go to Frontend Button -->
      <a
        href="http://localhost:4200"
        target="_blank"
        class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all hover:bg-gray-100 dark:hover:bg-gray-700 group border-2 border-dashed border-gray-300 dark:border-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
        </svg>
        <span class="font-medium">Go to Frontend</span>
      </a>
    </nav>

    <!-- User Profile -->
    <div class="px-4 py-4 border-t border-gray-200 dark:border-gray-700">
      <div class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer transition-colors">
        <div class="w-10 h-10 rounded-full bg-gradient-to-r from-[rgb(0,200,151)] to-[rgb(255,127,80)] flex items-center justify-center text-white font-semibold">
          A
        </div>
        <div class="flex-1">
          <p class="text-sm font-medium">Admin User</p>
          <p class="text-xs text-gray-500 dark:text-gray-400">admin@skillforge.com</p>
        </div>
      </div>
    </div>
  </div>
</aside>

# Configuration du service
spring.application.name=user-service
server.port=8085

# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuration Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Configuration Keycloak (PORT MODIFIÉ)
keycloak.realm=wordly-realm
keycloak.auth-server-url=http://localhost:9090
keycloak.resource=wordly-client
keycloak.credentials.secret=xe0RClKliAFcibJWgJNb76nVBqoXjRup
keycloak.use-resource-role-mappings=true
keycloak.bearer-only=true

# Configuration OAuth2 Resource Server (Keycloak)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/wordly-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/wordly-realm/protocol/openid-connect/certs

# Keycloak Admin Client
keycloak.admin.server-url=http://localhost:9090
keycloak.admin.realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin

# Configuration Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.tn.esprit.user=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.keycloak=DEBUG

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads/receipts

